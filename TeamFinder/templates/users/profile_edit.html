{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Редактирование профиля - TeamFinder{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Редактирование профиля</h3>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Сохранить изменения</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'profile' user.id %}">Вернуться к профилю</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
