{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Регистрация - TeamFinder{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Регистрация аккаунта</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Зарегистрироваться</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'users:login' %}">Уже есть аккаунт? Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
