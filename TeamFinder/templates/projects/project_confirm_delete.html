{% extends 'base.html' %}

{% block title %}Удаление проекта - TeamFinder{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h3 class="card-title text-danger mb-4">Подтверждение удаления</h3>
                <p>Вы уверены, что хотите удалить проект <strong>"{{ project.name }}"</strong>?</p>
                <p class="text-muted">Это действие невозможно отменить.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'projects:project_detail' project.pk %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-danger">Удалить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
